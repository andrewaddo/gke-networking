apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-custom-config
data:
  server.py: |
    from http.server import HTTPServer, BaseHTTPRequestHandler
    import os

    class PodInfoHandler(BaseHTTPRequestHandler):
        def do_GET(self):
            self.send_response(200)
            self.send_header('Content-type', 'text/html')
            self.end_headers()
            
            html = f"""
            <html>
            <body>
                <h1>Pod Information</h1>
                <p>Pod Name: {os.environ.get('POD_NAME', 'unknown')}</p>
                <p>Node Name: {os.environ.get('NODE_NAME', 'unknown')}</p>
                <p>Pod IP: {os.environ.get('POD_IP', 'unknown')}</p>
            </body>
            </html>
            """
            self.wfile.write(html.encode())

    if __name__ == '__main__':
        server = HTTPServer(('0.0.0.0', 80), PodInfoHandler)
        server.serve_forever() 